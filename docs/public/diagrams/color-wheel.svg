<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">色相環の例</title>
  <desc id="desc">色相を環状に並べた色相環の図。赤・橙・黄・黄緑・緑・青緑・青・青紫・紫・赤紫の10色相が円環に並び、対角の色どうしが補色（赤と青緑、黄と紫など）の関係になる。</desc>
  <style>
    .bg { fill: #ffffff; }
    .t-h1 { fill: #1e293b; }
    .t-muted { fill: #94a3b8; }
    .complement { stroke: #475569; }
    .label-stroke { stroke: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1f1f1f; }
      .t-h1 { fill: #e2e8f0; }
      .t-muted { fill: #64748b; }
      .complement { stroke: #94a3b8; }
      /* 色相の上に乗るラベルは色サンプル上に乗るため、両モードで白ストローク維持 */
    }
  </style>
  <rect class="bg" width="360" height="360"/>
  <text x="180" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" class="t-h1">色相環の例（10色相）</text>

  <g>
    <!-- 10色相を36度ずつ、12時から時計回りに配置 -->
    <path d="M180.00,68.00 A128 128 0 0 1 255.24,92.45 L222.32,137.75 A72 72 0 0 0 180.00,124.00 Z" fill="#e60026"/>
    <path d="M255.24,92.45 A128 128 0 0 1 301.74,156.45 L248.48,173.75 A72 72 0 0 0 222.32,137.75 Z" fill="#f07800"/>
    <path d="M301.74,156.45 A128 128 0 0 1 301.74,235.55 L248.48,218.25 A72 72 0 0 0 248.48,173.75 Z" fill="#f5d000"/>
    <path d="M301.74,235.55 A128 128 0 0 1 255.24,299.55 L222.32,254.25 A72 72 0 0 0 248.48,218.25 Z" fill="#88c000"/>
    <path d="M255.24,299.55 A128 128 0 0 1 180.00,324.00 L180.00,268.00 A72 72 0 0 0 222.32,254.25 Z" fill="#00a040"/>
    <path d="M180.00,324.00 A128 128 0 0 1 104.76,299.55 L137.68,254.25 A72 72 0 0 0 180.00,268.00 Z" fill="#00a890"/>
    <path d="M104.76,299.55 A128 128 0 0 1 58.26,235.55 L111.52,218.25 A72 72 0 0 0 137.68,254.25 Z" fill="#008cc8"/>
    <path d="M58.26,235.55 A128 128 0 0 1 58.26,156.45 L111.52,173.75 A72 72 0 0 0 111.52,218.25 Z" fill="#4858a8"/>
    <path d="M58.26,156.45 A128 128 0 0 1 104.76,92.45 L137.68,137.75 A72 72 0 0 0 111.52,173.75 Z" fill="#8848a0"/>
    <path d="M104.76,92.45 A128 128 0 0 1 180.00,68.00 L180.00,124.00 A72 72 0 0 0 137.68,137.75 Z" fill="#c83080"/>

    <!-- 補色の対角線（例: 赤と青緑、黄と紫）-->
    <line x1="199.78" y1="135.13" x2="160.22" y2="256.87" class="complement" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
    <line x1="244.00" y1="196.00" x2="116.00" y2="196.00" class="complement" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>

    <!-- ラベル -->
    <g font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle"
       paint-order="stroke" class="label-stroke" stroke-width="2.5" fill="#1e293b">
      <text x="210.90" y="105.39">赤</text>
      <text x="260.90" y="141.72">橙</text>
      <text x="280.00" y="200.50">黄</text>
      <text x="260.90" y="259.28">黄緑</text>
      <text x="210.90" y="295.61">緑</text>
      <text x="149.10" y="295.61">青緑</text>
      <text x="99.10" y="259.28">青</text>
      <text x="80.00" y="200.50">青紫</text>
      <text x="99.10" y="141.72">紫</text>
      <text x="149.10" y="105.39">赤紫</text>
    </g>
  </g>

  <text x="180" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" class="t-muted">対角の色どうしが補色の関係（例：赤 ↔ 青緑、黄 ↔ 紫）</text>
</svg>
