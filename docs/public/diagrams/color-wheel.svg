<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">色相環の例</title>
  <desc id="desc">色相を環状に並べた色相環の図。赤・橙・黄・黄緑・緑・青緑・青・青紫・紫・赤紫の10色相が円環に並び、対角の色どうしが補色（赤と青緑、黄と紫など）の関係になる。</desc>
  <style>
    .bg { fill: #ffffff; }
    .t-h1 { fill: #1e293b; }
    .t-muted { fill: #94a3b8; }
    .complement { stroke: #475569; }
    .label-stroke { stroke: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1f1f1f; }
      .t-h1 { fill: #e2e8f0; }
      .t-muted { fill: #64748b; }
      .complement { stroke: #94a3b8; }
      /* 色相の上に乗るラベルは色サンプル上に乗るため、両モードで白ストローク維持 */
    }
  </style>
  <rect class="bg" width="360" height="360"/>
  <text x="180" y="24" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" class="t-h1">色相環の例（10色相）</text>

  <g transform="translate(0,32)">
    <!-- 10 色相を 36 度ずつ、12時から時計回りに配置 -->
    <!-- 赤 (R) 0度 -->
    <path d="M180,40 A140 140 0 0 1 262.27,66.74 L218.36,103.39 A85 85 0 0 0 180,90 Z" fill="#e60026"/>
    <!-- 橙 (O) 36度 -->
    <path d="M262.27,66.74 A140 140 0 0 1 313.26,135.71 L237.30,148.39 A85 85 0 0 0 218.36,103.39 Z" fill="#f07800"/>
    <!-- 黄 (Y) 72度 -->
    <path d="M313.26,135.71 A140 140 0 0 1 308.49,221.43 L237.65,177.10 A85 85 0 0 0 237.30,148.39 Z" fill="#f5d000"/>
    <!-- 黄緑 (YG) 108度 -->
    <path d="M308.49,221.43 A140 140 0 0 1 248.54,283.18 L221.81,212.91 A85 85 0 0 0 237.65,177.10 Z" fill="#88c000"/>
    <!-- 緑 (G) 144度 -->
    <path d="M248.54,283.18 A140 140 0 0 1 167.79,319.59 L177.74,234.83 A85 85 0 0 0 221.81,212.91 Z" fill="#00a040"/>
    <!-- 青緑 (BG) 180度 -->
    <path d="M167.79,319.59 A140 140 0 0 1 84.18,287.59 L132.93,217.65 A85 85 0 0 0 177.74,234.83 Z" fill="#00a890"/>
    <!-- 青 (B) 216度 -->
    <path d="M84.18,287.59 A140 140 0 0 1 47.85,221.43 L120.21,180.16 A85 85 0 0 0 132.93,217.65 Z" fill="#008cc8"/>
    <!-- 青紫 (PB) 252度 -->
    <path d="M47.85,221.43 A140 140 0 0 1 51.31,141.76 L125.51,148.49 A85 85 0 0 0 120.21,180.16 Z" fill="#4858a8"/>
    <!-- 紫 (P) 288度 -->
    <path d="M51.31,141.76 A140 140 0 0 1 105.61,72.99 L143.36,109.79 A85 85 0 0 0 125.51,148.49 Z" fill="#8848a0"/>
    <!-- 赤紫 (RP) 324度 -->
    <path d="M105.61,72.99 A140 140 0 0 1 180,40 L180,90 A85 85 0 0 0 143.36,109.79 Z" fill="#c83080"/>

    <!-- 補色の対角線（例: 赤と青緑、黄と紫）-->
    <line x1="180" y1="68" x2="180" y2="292" class="complement" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
    <line x1="285" y1="135" x2="75" y2="225" class="complement" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>

    <!-- ラベル -->
    <g font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle"
       paint-order="stroke" class="label-stroke" stroke-width="2.5" fill="#1e293b">
      <text x="200" y="78">赤</text>
      <text x="240" y="106">橙</text>
      <text x="255" y="155">黄</text>
      <text x="240" y="200">黄緑</text>
      <text x="200" y="227">緑</text>
      <text x="160" y="227">青緑</text>
      <text x="120" y="200">青</text>
      <text x="105" y="155">青紫</text>
      <text x="120" y="106">紫</text>
      <text x="160" y="78">赤紫</text>
    </g>
  </g>

  <text x="180" y="352" text-anchor="middle" font-family="sans-serif" font-size="11" class="t-muted">対角の色どうしが補色の関係（例：赤 ↔ 青緑、黄 ↔ 紫）</text>
</svg>
