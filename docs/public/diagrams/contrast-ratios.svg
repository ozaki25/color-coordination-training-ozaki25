<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">コントラスト比と WCAG 基準</title>
  <desc id="desc">コントラスト比 1.5:1 から 21:1 までの実例。WCAG AAは標準テキスト4.5:1以上、大きな文字・図形3:1以上、AAAは7:1以上。白黒の組み合わせが最大の21:1。</desc>
  <style>
    .bg { fill: #ffffff; }
    .t-h1 { fill: #1e293b; }
    .t-h2 { fill: #475569; }
    .t-h3 { fill: #64748b; }
    .ok-text { fill: #15803d; }
    .ng-text { fill: #b91c1c; }
    .panel { fill: #f8fafc; stroke: #e2e8f0; }
    .stroke-faint { stroke: #94a3b8; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1f1f1f; }
      .t-h1 { fill: #e2e8f0; }
      .t-h2 { fill: #cbd5e1; }
      .t-h3 { fill: #94a3b8; }
      .ok-text { fill: #86efac; }
      .ng-text { fill: #fca5a5; }
      .panel { fill: #2a2a2a; stroke: #444444; }
      .stroke-faint { stroke: #64748b; }
    }
  </style>
  <rect class="bg" width="760" height="430"/>

  <text x="380" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" class="t-h1">コントラスト比と WCAG 基準</text>
  <text x="380" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" class="t-h3">同じ「赤系の地に黒文字」でも、明度差でコントラスト比が大きく変わる</text>

  <!-- 1.5:1 (NG) -->
  <g>
    <rect x="40" y="78" width="200" height="60" rx="6" fill="#c2393d" class="stroke-faint"/>
    <text x="140" y="116" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">文字 Aa あいう</text>
    <text x="280" y="100" font-family="sans-serif" font-size="14" class="t-h1" font-weight="700">コントラスト比 約 1.5:1</text>
    <text x="280" y="120" font-family="sans-serif" font-size="13" class="ng-text">✕ WCAG 不適合（誰にも読みにくい）</text>
    <text x="280" y="138" font-family="sans-serif" font-size="11" class="t-h3">明度差が小さく、文字が背景に沈む</text>
  </g>

  <!-- 3:1 (AA for large text) -->
  <g>
    <rect x="40" y="156" width="200" height="60" rx="6" fill="#d97070" class="stroke-faint"/>
    <text x="140" y="194" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">文字 Aa あいう</text>
    <text x="280" y="178" font-family="sans-serif" font-size="14" class="t-h1" font-weight="700">コントラスト比 3:1</text>
    <text x="280" y="198" font-family="sans-serif" font-size="13" class="ok-text">◎ WCAG AA（大きい文字・図形要素の最低基準）</text>
    <text x="280" y="216" font-family="sans-serif" font-size="11" class="t-h3">18 ポイント以上、または 14 ポイント以上の太字に適用</text>
  </g>

  <!-- 4.5:1 (AA for normal text) -->
  <g>
    <rect x="40" y="234" width="200" height="60" rx="6" fill="#f0b3b3" class="stroke-faint"/>
    <text x="140" y="272" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">文字 Aa あいう</text>
    <text x="280" y="256" font-family="sans-serif" font-size="14" class="t-h1" font-weight="700">コントラスト比 4.5:1</text>
    <text x="280" y="276" font-family="sans-serif" font-size="13" class="ok-text">◎ WCAG AA（標準テキストの最低基準・最重要）</text>
    <text x="280" y="294" font-family="sans-serif" font-size="11" class="t-h3">通常の本文・キャプションで満たすべき基準</text>
  </g>

  <!-- 7:1 (AAA) -->
  <g>
    <rect x="40" y="312" width="200" height="60" rx="6" fill="#fcdcdc" class="stroke-faint"/>
    <text x="140" y="350" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">文字 Aa あいう</text>
    <text x="280" y="334" font-family="sans-serif" font-size="14" class="t-h1" font-weight="700">コントラスト比 7:1</text>
    <text x="280" y="354" font-family="sans-serif" font-size="13" class="ok-text">◎◎ WCAG AAA（より高い水準）</text>
    <text x="280" y="372" font-family="sans-serif" font-size="11" class="t-h3">高齢者・ロービジョンの人にも読みやすい配色</text>
  </g>

  <!-- 凡例 -->
  <rect x="40" y="386" width="680" height="34" rx="6" class="panel"/>
  <text x="60" y="408" font-family="sans-serif" font-size="13" class="t-h1" font-weight="700">最大: 白地 × 黒文字 = 21:1（最も見やすい組み合わせ）</text>
</svg>
