<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" role="img" aria-labelledby="title desc">
  <title id="title">可視光線のスペクトル</title>
  <desc id="desc">波長約380nmの紫から780nmの赤まで、波長と色の対応を示した帯。短波長側が紫・青、長波長側が赤。</desc>
  <style>
    .bg { fill: #ffffff; }
    .t-h1 { fill: #1e293b; }
    .t-h2 { fill: #475569; }
    .t-h3 { fill: #64748b; }
    .stroke-strong { stroke: #475569; }
    .stroke-faint { stroke: #94a3b8; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1f1f1f; }
      .t-h1 { fill: #e2e8f0; }
      .t-h2 { fill: #cbd5e1; }
      .t-h3 { fill: #94a3b8; }
      .stroke-strong { stroke: #94a3b8; }
      .stroke-faint { stroke: #64748b; }
    }
  </style>
  <rect class="bg" width="800" height="180"/>
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b00b3"/>
      <stop offset="13%" stop-color="#4400ff"/>
      <stop offset="26%" stop-color="#0066ff"/>
      <stop offset="40%" stop-color="#00c8c8"/>
      <stop offset="52%" stop-color="#00c400"/>
      <stop offset="64%" stop-color="#d4e400"/>
      <stop offset="74%" stop-color="#ffd000"/>
      <stop offset="85%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#e60000"/>
    </linearGradient>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" class="t-h1">可視光線（約 380〜780nm）</text>

  <rect x="60" y="50" width="680" height="60" rx="4" fill="url(#spectrum)" class="stroke-faint" stroke-width="1"/>

  <g font-family="sans-serif" font-size="13" class="t-h1" text-anchor="middle">
    <line x1="60"  y1="110" x2="60"  y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="60"  y="140">380</text>
    <line x1="179" y1="110" x2="179" y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="179" y="140">450</text>
    <line x1="298" y1="110" x2="298" y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="298" y="140">520</text>
    <line x1="417" y1="110" x2="417" y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="417" y="140">590</text>
    <line x1="570" y1="110" x2="570" y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="570" y="140">680</text>
    <line x1="740" y1="110" x2="740" y2="122" class="stroke-strong" stroke-width="1"/>
    <text x="740" y="140">780</text>
    <text x="400" y="162" font-size="13" class="t-h3">波長 (nm)</text>
  </g>

  <text x="60"  y="46" text-anchor="start" font-family="sans-serif" font-size="13" class="t-h2">短波長（紫・青）</text>
  <text x="740" y="46" text-anchor="end"   font-family="sans-serif" font-size="13" class="t-h2">長波長（赤）</text>
</svg>
